name: med_control
description: "App móvil local-first con IA y base de conocimiento para gestión de medicamentos."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local persistence
  drift: ^2.23.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.29
  path_provider: ^2.1.5
  path: ^1.9.1

  # Local notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Camera & image
  image_picker: ^1.1.2
  camera: ^0.11.1

  # OCR — on-device (fallback)
  google_mlkit_text_recognition: ^0.14.0

  # HTTP client (AI provider calls)
  http: ^1.3.0

  # Google Cloud service account auth (Cloud Vision OAuth2)
  googleapis_auth: ^2.0.0

  # Environment variables
  flutter_dotenv: ^5.2.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  equatable: ^2.0.7
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  drift_dev: ^2.23.1
  mockito: ^5.4.5

flutter:
  uses-material-design: true
  assets:
    - .env
    - medcontrolv2-1666ed6c79b5.json
